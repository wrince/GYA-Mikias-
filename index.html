<!DOCTYPE html>  <html>  
<head>  
<meta charset="UTF-8">  
<title>Student Super Hub</title>  
<style>  
body{  
  margin:0;  
  font-family: Arial;  
  text-align: center;  
  color:white;  
  overflow-x:hidden;  
  background:black;  
}  /* Background fade layers */
.bg-slide{
position: fixed;
top:0; left:0;
width:100%;
height:100%;
background-size: cover;
background-position: center;
opacity:0;
transition: opacity 2s ease-in-out;
z-index:-1;
}

/* Neon Title */
#titleNeon{
font-size: 3em;
font-weight: bold;
color:black;
text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff;
margin: 20px 0 5px 0;
}
#subtitleNeon{
font-size: 2em;
color:black;
text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff;
margin-bottom: 20px;
}

/* Dropdown styling */
.dropdown {
cursor:pointer;
padding: 10px;
border-radius:10px;
border:2px solid #0ff;
background: rgba(0,0,0,0.6);
margin-bottom:10px;
display:inline-block;
text-shadow:0 0 5px #0ff;
transition: box-shadow 0.3s, transform 0.3s;
}
.dropdown:hover{
box-shadow:0 0 30px #0ff;
transform: scale(1.05);
}

/* Feature containers */
.feature-container{
display:none;
margin-top:10px;
border:2px solid #0ff;
border-radius:12px;
padding:10px;
background: rgba(0,0,0,0.6);
}

/* Buttons */
button{
padding:6px 8px;
margin:3px;
cursor:pointer;
border:none;
border-radius:6px;
background: rgba(0,255,255,0.2);
color:#0ff;
font-weight:bold;
text-shadow: 0 0 5px #0ff;
}
button:hover, button:active{
box-shadow:0 0 30px #0ff;
transform: scale(1.05);
}

/* Inputs and textarea */
input,textarea{
padding:6px;
margin:4px;
border-radius:6px;
border:none;
background: rgba(0,0,0,0.6);
color:#0ff;
text-shadow:0 0 5px #0ff;
}

/* Notes display */
#savedNotes{
margin-top:10px;
text-align:left;
max-height:150px;
overflow:auto;
border-top:1px dashed #0ff;
padding-top:5px;
}

/* Calculator screen */
#calcScreen{
width:100%;
font-size:24px;
text-align:right;
background: rgba(0,0,0,0.8);
color:#0f0;
text-shadow:0 0 5px #0f0;
}

/* Tic Tac Toe Styles */
#board{
display:grid;
grid-template-columns: repeat(3, 80px);
grid-template-rows: repeat(3, 80px);
gap:5px;
justify-content:center;
margin:10px auto;
position:relative;
}
#board button{
font-size:32px;
width:80px;
height:80px;
}
.win-line{
position:absolute;
height:4px;
background:#0ff;
border-radius:2px;
box-shadow:0 0 20px #0ff,0 0 40px #0ff,0 0 60px #0ff;
z-index:10;
}
#winner{
font-size:20px;
margin-top:5px;
color:#0ff;
}
#scoreboard{
margin-top:5px;
font-size:18px;
color:#0ff;
}
</style>

</head>  
<body>  <!-- Background layers -->  <div id="bg1" class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1585079544481-3d8b53ef7039?auto=format&fit=crop&w=1350&q=80');"></div>  
<div id="bg2" class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1350&q=80');"></div>  
<div id="bg3" class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1493244040629-496f6d136cc3?auto=format&fit=crop&w=1350&q=80');"></div>  <!-- Title -->  <div id="titleNeon">Mikiyas Kassaye</div>  
<div id="subtitleNeon">Science Fair GYA</div>  <!-- Main Features Dropdown -->  <div class="dropdown" onclick="toggleFeature('allFeatures')">▼ Features</div>  
<div id="allFeatures" class="feature-container">    <!-- Calculator -->    <div class="dropdown" onclick="toggleFeature('calculatorFeature')">Calculator</div>  
  <section id="calculatorFeature" class="feature-container">  
    <input type="text" id="calcScreen" readonly placeholder="0"><br>  
    <div>  
      <button onclick="press('7')">7</button>  
      <button onclick="press('8')">8</button>  
      <button onclick="press('9')">9</button>  
      <button onclick="press('/')">/</button>  
      <button onclick="press('Math.pow(')">xʸ</button>  
      <br>  
      <button onclick="press('4')">4</button>  
      <button onclick="press('5')">5</button>  
      <button onclick="press('6')">6</button>  
      <button onclick="press('*')">*</button>  
      <button onclick="press('Math.sqrt(')">√</button>  
      <br>  
      <button onclick="press('1')">1</button>  
      <button onclick="press('2')">2</button>  
      <button onclick="press('3')">3</button>  
      <button onclick="press('-')">-</button>  
      <button onclick="press('Math.log(')">log</button>  
      <br>  
      <button onclick="press('0')">0</button>  
      <button onclick="press('.')">.</button>  
      <button onclick="calculate()">=</button>  
      <button onclick="press('+')">+</button>  
      <button onclick="press('Math.sin(')">sin</button>  
      <br>  
      <button onclick="press('(')">(</button>  
      <button onclick="press(')')">)</button>  
      <button onclick="press('Math.cos(')">cos</button>  
      <button onclick="press('Math.tan(')">tan</button>  
      <button onclick="press('!')">!</button>  
      <br>  
      <button onclick="press('Math.exp(')">eˣ</button>  
      <button onclick="press('Math.PI')">π</button>  
      <button onclick="press('Math.E')">e</button>  
      <button onclick="press('1/')">1/x</button>  
      <button onclick="clearCalc()">C</button>  
    </div>  
  </section>    <!-- Notes -->    <div class="dropdown" onclick="toggleFeature('notesFeature')">Notes</div>  
  <section id="notesFeature" class="feature-container">  
    <textarea id="notes" rows="4" placeholder="Write notes here"></textarea><br>  
    <button onclick="saveNotes()">Save Note</button>  
    <div id="savedNotes"></div>  
  </section>    <!-- Pomodoro Timer -->    <div class="dropdown" onclick="toggleFeature('timerFeature')">Pomodoro Timer</div>  
  <section id="timerFeature" class="feature-container">  
    <label>Study time (minutes): </label><input type="number" id="studyTime" value="25" min="1"><br>  
    <label>Break time (minutes): </label><input type="number" id="breakTime" value="5" min="1"><br>  
    <p id="timerDisplay">25:00</p>  
    <button onclick="startCustomTimer()">Start</button>  
    <button onclick="pauseTimer()">Pause</button>  
    <button onclick="resetCustomTimer()">Reset</button>  
    <p id="statusDisplay"></p>  
  </section>    <!-- Unit Converter -->    <div class="dropdown" onclick="toggleFeature('converterFeature')">Unit Converter</div>  
  <section id="converterFeature" class="feature-container">  
    <input id="convertInput" placeholder="Enter value"><br><br>  
    <button onclick="mToCm()">Meters → Centimeters</button>  
    <button onclick="cmToM()">Centimeters → Meters</button>  
    <button onclick="kmToMiles()">Kilometers → Miles</button>  
    <button onclick="milesToKm()">Miles → Kilometers</button><br>  
    <button onclick="kgToG()">Kilograms → Grams</button>  
    <button onclick="gToKg()">Grams → Kilograms</button>  
    <button onclick="kgToLb()">Kilograms → Pounds</button>  
    <button onclick="lbToKg()">Pounds → Kilograms</button><br>  
    <button onclick="cToF()">C → F</button>  
    <button onclick="fToC()">F → C</button>  
    <p id="convertResult"></p>  
  </section>    <!-- Motivation -->    <div class="dropdown" onclick="toggleFeature('motivationFeature')">Motivation</div>  
  <section id="motivationFeature" class="feature-container">  
    <p id="quote"></p>  
    <button onclick="newQuote()">New Motivation</button>  
  </section>    <!-- Tic Tac Toe -->    <div class="dropdown" onclick="toggleFeature('tictactoeFeature')">Tic Tac Toe</div>  
  <section id="tictactoeFeature" class="feature-container">  
    <div id="board">  
      <button onclick="play(this)"></button>  
      <button onclick="play(this)"></button>  
      <button onclick="play(this)"></button>  
      <button onclick="play(this)"></button>  
      <button onclick="play(this)"></button>  
      <button onclick="play(this)"></button>  
      <button onclick="play(this)"></button>  
      <button onclick="play(this)"></button>  
      <button onclick="play(this)"></button>  
    </div>  
    <div id="scoreboard">X Wins: 0 | O Wins: 0</div>  
    <button onclick="resetScores()">Reset Scoreboard</button>  
    <p id="winner"></p>  
    <button onclick="resetGame()">Restart</button>  
  </section>  </div>  <script>  
// Background fade  
let bgLayers=[document.getElementById('bg1'),document.getElementById('bg2'),document.getElementById('bg3')];  
let current=0;  
function fadeBackground(){  
  bgLayers.forEach((bg,i)=>bg.style.opacity=(i===current?1:0));  
  current=(current+1)%bgLayers.length;  
}  
fadeBackground();  
setInterval(fadeBackground,5000);  
  
// Toggle feature  
function toggleFeature(id){  
  let f=document.getElementById(id);  
  f.style.display=(f.style.display==='block')?'none':'block';  
}  
  
// Calculator  
function press(val){  
  let screen=document.getElementById("calcScreen");  
  if(val=="!") screen.value=factorial(parseFloat(screen.value));  
  else if(val=="1/") screen.value=1/parseFloat(screen.value);  
  else screen.value+=val;  
}  
function factorial(n){if(n<0)return"Error";if(n===0||n===1)return 1;let res=1;for(let i=2;i<=n;i++)res*=i;return res;}  
function calculate(){try{document.getElementById("calcScreen").value=eval(document.getElementById("calcScreen").value);}catch(e){document.getElementById("calcScreen").value="Error";}}  
function clearCalc(){document.getElementById("calcScreen").value="";}  
  
// Notes  
function saveNotes(){  
  let note=document.getElementById("notes").value;  
  if(note.trim()==="") return;  
  let saved=document.getElementById("savedNotes");  
  let div=document.createElement("div");  
  div.textContent=note;  
  saved.appendChild(div);  
  document.getElementById("notes").value="";  
}  
  
// Motivation  
let quotes=[  
  "Success comes from discipline","Study now shine later","Small progress every day",  
  "Focus on your goals","Hard work beats talent","Believe in yourself","Never give up",  
  "Stay positive","Work smarter, not harder","Dream big","Consistency is key","Push your limits",  
  "Failure is a stepping stone","Your effort matters","Keep learning"  
];  
function newQuote(){document.getElementById("quote").innerText=quotes[Math.floor(Math.random()*quotes.length)];}  
  
// Pomodoro Timer  
let timerInterval,totalSeconds,isStudy=true;  
function startCustomTimer(){clearInterval(timerInterval);let studyM=parseInt(document.getElementById("studyTime").value);let breakM=parseInt(document.getElementById("breakTime").value);totalSeconds=(isStudy?studyM:breakM)*60;document.getElementById("statusDisplay").innerText=isStudy?"Study Time":"Break Time";timerInterval=setInterval(()=>{totalSeconds--;let m=Math.floor(totalSeconds/60),s=totalSeconds%60;document.getElementById("timerDisplay").innerText=m+":"+(s<10?"0":"")+s;if(totalSeconds<=0){clearInterval(timerInterval);alert(isStudy?"Study over! Break time.":"Break over! Back to study.");isStudy=!isStudy;startCustomTimer();}},1000);}  
function pauseTimer(){clearInterval(timerInterval);}  
function resetCustomTimer(){clearInterval(timerInterval);let studyM=parseInt(document.getElementById("studyTime").value);totalSeconds=studyM*60;isStudy=true;document.getElementById("timerDisplay").innerText=studyM+":00";document.getElementById("statusDisplay").innerText="Ready";}  
  
// Unit Converter  
function mToCm(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=x*100}  
function cmToM(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=x/100}  
function kmToMiles(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=x*0.621371}  
function milesToKm(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=x/0.621371}  
function kgToG(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=x*1000}  
function gToKg(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=x/1000}  
function kgToLb(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=x*2.20462}  
function lbToKg(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=x/2.20462}  
function cToF(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=(x*9/5)+32}  
function fToC(){let x=document.getElementById("convertInput").value;document.getElementById("convertResult").innerText=(x-32)*5/9}  
  
// Tic Tac Toe  
let currentPlayer="X",xWins=0,oWins=0,winCombo=[];  
function play(cell){  
  if(cell.innerText!=="") return;  
  cell.innerText=currentPlayer;  
  if(checkWinner()){  
    if(currentPlayer==="X") xWins++; else oWins++;  
    document.getElementById("scoreboard").innerText=`X Wins: ${xWins} | O Wins: ${oWins}`;  
    drawWinLine(winCombo);  
  } else currentPlayer=currentPlayer==="X"?"O":"X";  
}  
function checkWinner(){  
  let cells=document.querySelectorAll("#board button");  
  const combos=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];  
  for(let c of combos){  
    let a=cells[c[0]].innerText,b=cells[c[1]].innerText,d=cells[c[2]].innerText;  
    if(a && a===b && b===d){winCombo=c;document.getElementById("winner").innerText=a+" Wins!";return true;}  
  }  
  return false;  
}  
function resetGame(){  
  document.querySelectorAll("#board button").forEach(c=>c.innerText="");  
  document.getElementById("winner").innerText="";  
  document.querySelectorAll(".win-line").forEach(l=>l.remove());  
  currentPlayer="X"; winCombo=[];  
}  
function resetScores(){xWins=0;oWins=0;document.getElementById("scoreboard").innerText="X Wins: 0 | O Wins: 0";}  
function drawWinLine(combo){  
  let board=document.getElementById("board");  
  let btns=document.querySelectorAll("#board button");  
  let rect1=btns[combo[0]].getBoundingClientRect();  
  let rect2=btns[combo[2]].getBoundingClientRect();  
  let line=document.createElement("div");  
  line.className="win-line";  
  board.appendChild(line);  
  let boardRect=board.getBoundingClientRect();  
  line.style.left=(rect1.left-boardRect.left+rect1.width/2) + "px";  
  line.style.top=(rect1.top-boardRect.top + rect1.height/2) + "px";  
  let dx=rect2.left - rect1.left;  
  let dy=rect2.top - rect1.top;  
  let length=Math.sqrt(dx*dx + dy*dy);  
  line.style.width=length + "px";  
  line.style.transformOrigin="0 50%";  
  let angle=Math.atan2(dy,dx)*180/Math.PI;  
  line.style.transform=`rotate(${angle}deg)`;  
}  
</script>  

</body>  
</html>
